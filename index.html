<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Heaven | A Soberania do Viver</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @theme { --font-serif: "Cormorant Garamond", serif; --color-gold: #C5A059; }
        body { @apply bg-black text-white font-sans antialiased; }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 p-6 flex justify-between items-center bg-black/50 backdrop-blur-md">
        <h1 class="text-2xl font-serif tracking-widest uppercase">Blue Heaven</h1>
        <div class="hidden md:flex space-x-8 text-[10px] uppercase tracking-[0.3em] opacity-70">
            <a href="#" class="hover:text-gold transition">Empreendimentos</a>
            <a href="#" class="hover:text-gold transition">Conceito</a>
            <a href="#" class="border border-white/20 px-4 py-2 hover:bg-white hover:text-black transition">Contato</a>
        </div>
    </nav>

    <section class="h-screen flex items-center justify-center relative overflow-hidden">
        <img src="https://images.unsplash.com/photo-1613545325278-f24b0cae1224?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover opacity-50">
        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/60"></div>
        
        <div class="z-10 text-center px-6">
            <h2 class="text-6xl md:text-9xl font-serif leading-tight mb-8">
                Arquitetura em<br><span class="italic text-gold">Sinfonia</span>
            </h2>
            <p class="tracking-[0.6em] uppercase text-xs opacity-60 mb-12">Balneário Camboriú | Santa Catarina</p>
            <button class="text-gold border-b border-gold/40 pb-2 uppercase tracking-widest text-[10px] hover:text-white hover:border-white transition-all">
                Conhecer o Infinitá Treehouse
            </button>
        </div>
    </section>
</body>
</html>
