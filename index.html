<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Heaven | Incorporadora de Luxo</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @theme { --font-serif: "Cormorant Garamond", serif; --color-gold: #C5A059; }
        body { @apply bg-[#080808] text-white antialiased; }
        .reveal { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body>
    <header class="fixed top-0 w-full z-50 p-8 flex justify-between items-center bg-black/80 backdrop-blur-md">
        <h1 class="text-xl font-serif tracking-[0.3em] uppercase italic">Blue Heaven</h1>
        <nav class="hidden md:flex gap-10 text-[10px] uppercase tracking-[0.4em] opacity-60">
            <a href="#home">Início</a><a href="#projetos">Projetos</a><a href="#contato">Contato</a>
        </nav>
    </header>

    <main>
        <section id="home" class="h-screen relative flex items-center justify-center">
            <img src="https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=2500" class="absolute inset-0 w-full h-full object-cover opacity-50">
            <div class="z-10 text-center px-4">
                <h2 class="text-6xl md:text-9xl font-serif leading-none mb-4 reveal">Vida em <span class="italic text-gold">Sinfonia</span></h2>
            </div>
        </section>

        <section id="projetos" class="py-40 px-10 bg-[#0a0a0a]">
            <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-20">
                <div class="reveal"><img src="https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=800" class="border border-white/10 opacity-70 hover:opacity-100 transition"></div>
                <div class="reveal pt-20"><h3 class="text-4xl font-serif italic mb-6">Infinitá Treehouse</h3><p class="opacity-40 text-sm tracking-widest uppercase">Design Biofílico | Praia Brava</p></div>
            </div>
        </section>
    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        gsap.utils.toArray(".reveal").forEach(el => {
            gsap.to(el, { scrollTrigger: el, opacity: 1, y: 0, duration: 1.5, ease: "power4.out" });
        });
    </script>
</body>
</html>
